<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jin's Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Cormorant+Garamond:wght@600;700&family=Gowun+Batang:wght@700&family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Caveat:wght@500;700&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:        #F7F4EE;
    --surface:   #FFFFFF;
    --surface-2: #FBF9F4;
    --ink:       #2A2D34;
    --ink-soft:  #5C6068;
    --ink-mute:  #9AA0A6;
    --line:      #E9E3D6;

    /* ocean blue palette */
    --accent:    #4D94D6;
    --accent-d:  #2E6DA8;
    --accent-2:  #C99D5C;

    --danger:    #E25C5C;
    --ok:        #6BB36F;
    --chip-bg:   #F0EADB;
    --shadow:    0 6px 24px rgba(80, 70, 50, .08);
    --radius:    14px;

    /* title colors — sunset deep blue + vivid accents */
    --jin-navy:  #1E3A8A;  /* 해질녘 짙은 사파이어 블루 */
    --title-blue:#EC4899;  /* 비비드 핫핑크 */
    --title-gold:#FBBF24;  /* 비비드 앰버 */
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
    font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 28px 96px; }

  header.app-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    padding-bottom: 22px; margin-bottom: 26px;
    border-bottom: 1px dashed var(--line);
  }

  /* ---------- Title (bigger, bolder, rainbow) ---------- */
  .brand h1 {
    font-family: 'Playfair Display', 'Cormorant Garamond', 'Gowun Batang', serif;
    font-style: normal;
    font-weight: 800;
    font-size: 64px;
    line-height: 1.0;
    margin: 0;
    letter-spacing: -0.5px;
    text-shadow: 0 1px 0 rgba(0,0,0,.04);
  }
  .brand h1 .jin   {
    color: var(--jin-navy);
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .brand h1 .rest  {
    color: var(--title-blue);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .brand h1 .dot   {
    color: var(--title-gold);
    font-weight: 800;
    margin-left: 2px;
  }
  .brand p {
    margin: 10px 0 0;
    color: var(--ink);
    font-family: 'Nanum Pen Script', 'Caveat', 'Gaegu', cursive;
    font-size: 30px; line-height: 1.15;
    letter-spacing: 0;
  }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* ---------- Account widget ---------- */
  .account-widget {
    display: inline-flex; align-items: center; gap: 6px;
    margin-right: 4px;
  }
  .account-widget .email {
    font-size: 12px; color: var(--ink-soft);
    padding: 4px 10px;
    background: var(--surface-2);
    border-radius: 999px;
    border: 1px solid var(--line);
  }

  /* ---------- Buttons ---------- */
  button, .btn {
    font-family: inherit; font-size: 14px;
    border: 1px solid var(--line); background: var(--surface);
    color: var(--ink); padding: 9px 16px; border-radius: 999px;
    cursor: pointer; transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover, .btn:hover {
    border-color: var(--accent); color: var(--accent-d);
    transform: translateY(-1px);
  }
  button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.primary:hover {
    background: var(--accent-d); border-color: var(--accent-d); color: #fff;
  }
  button.ghost {
    background: transparent; border-color: transparent; color: var(--ink-soft);
  }
  button.ghost:hover { color: var(--accent-d); border-color: transparent; }
  button.danger { color: var(--danger); border-color: #f1c9c8; }
  button.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: grid; grid-template-columns: 1fr auto;
    gap: 12px; align-items: center; margin-bottom: 16px;
  }
  .search { position: relative; }
  .search input {
    width: 100%;
    padding: 14px 18px 14px 50px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--surface);
    font-family: inherit; font-size: 15px; color: var(--ink);
    box-shadow: var(--shadow);
    transition: border-color .15s ease;
  }
  .search input:focus { outline: none; border-color: var(--accent); }
  .search .icon-btn {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    border: none; background: transparent; padding: 6px 10px;
    color: var(--ink-mute); font-size: 18px; cursor: pointer;
    border-radius: 999px;
  }
  .search .icon-btn:hover { color: var(--accent-d); background: transparent; transform: translateY(-50%); }

  /* ---------- Chips (categories) ---------- */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .chip {
    background: var(--chip-bg); color: var(--ink-soft);
    padding: 6px 14px; border-radius: 999px; font-size: 13px;
    border: 1px solid transparent;
    cursor: pointer; user-select: none;
    transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { transform: translateY(-1px); }
  .chip.active { outline: 2px solid rgba(0,0,0,.08); }
  .chip .x { opacity: .5; font-size: 12px; line-height: 1; margin-left: 2px; }
  .chip .x:hover { opacity: 1; }

  /* "전체" chip uses accent */
  .chip.chip-all { background: #E6F1FF; color: var(--accent-d); }
  .chip.chip-all.active { background: var(--accent); color: #fff; }

  /* ---------- Selection bar ---------- */
  .selection-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #FFF8E6; border: 1px solid #F0DDA8;
    padding: 10px 16px; border-radius: var(--radius);
    margin-bottom: 16px;
  }
  .selection-bar.hidden { display: none; }

  /* ---------- Term cards ---------- */
  .terms { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .term-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 14px; align-items: start;
    transition: border-color .15s ease, transform .15s ease;
  }
  .term-card:hover { border-color: var(--accent); }
  .term-card.selected { border-color: var(--accent-2); background: #FFFBF0; }

  .term-check {
    width: 20px; height: 20px; cursor: pointer;
    accent-color: var(--accent); margin-top: 6px;
  }
  .term-thumb {
    width: 84px; height: 84px; border-radius: 12px;
    object-fit: cover; background: var(--surface-2);
    border: 1px solid var(--line); cursor: zoom-in;
  }
  .term-head { display: flex; gap: 10px; flex-wrap: wrap; align-items: baseline; }
  .term-ko { font-size: 19px; font-weight: 700; color: var(--ink); }
  .term-en { font-size: 14px; color: var(--accent-d); font-family: 'Nanum Gothic Coding', monospace; }
  .term-cat {
    font-size: 12px; padding: 2px 10px; border-radius: 999px;
  }
  .term-meaning { margin-top: 8px; color: var(--ink-soft); font-size: 14.5px; white-space: pre-wrap; }
  .term-actions { display: flex; gap: 4px; }
  .term-actions button { padding: 6px 10px; font-size: 12px; }

  .empty {
    text-align: center; color: var(--ink-mute); padding: 60px 20px;
    border: 1px dashed var(--line); border-radius: var(--radius);
    background: var(--surface-2);
  }
  .empty h3 { margin: 0 0 8px; color: var(--ink-soft); font-weight: 400; }
  .empty p { margin: 0; font-size: 14px; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(30, 25, 15, .35);
    display: none; align-items: center; justify-content: center; z-index: 100;
    padding: 20px; backdrop-filter: blur(2px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
    padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal h2 {
    margin: 0 0 18px; font-size: 22px; font-weight: 700;
    font-family: 'Jua', 'Gaegu', 'Gowun Dodum', sans-serif;
  }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 13px; color: var(--ink-soft); }
  .field label .req { color: var(--danger); margin-left: 2px; }
  .field input, .field textarea, .field select {
    font-family: inherit; font-size: 15px; color: var(--ink);
    padding: 10px 14px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface-2);
    transition: border-color .15s ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--accent); background: var(--surface);
  }
  .field textarea { resize: vertical; min-height: 100px; }

  /* photo upload */
  .photo-upload {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border: 1px dashed var(--line); border-radius: 10px;
    background: var(--surface-2);
  }
  .photo-preview {
    width: 96px; height: 96px; border-radius: 10px;
    background: #EEE9DA; display: flex; align-items: center; justify-content: center;
    color: var(--ink-mute); font-size: 12px; overflow: hidden; flex-shrink: 0;
  }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-actions { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .photo-actions .hint { font-size: 12px; color: var(--ink-mute); }

  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  /* ---------- Lightbox ---------- */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    display: none; align-items: center; justify-content: center; z-index: 300;
    cursor: zoom-out; padding: 30px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff;
    padding: 12px 22px; border-radius: 999px; font-size: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
    z-index: 400;
  }
  .toast.show { opacity: 1; }

  /* ---------- Loading splash ---------- */
  .splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 600;
    font-family: 'Playfair Display', serif;
    font-size: 28px; color: var(--jin-navy);
  }
  .splash.hidden { display: none; }
  .splash .dot { color: var(--title-gold); }

  /* ---------- Login screen ---------- */
  .login-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: none; align-items: center; justify-content: center;
    z-index: 500; padding: 20px;
  }
  .login-screen.open { display: flex; }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 36px;
    max-width: 420px; width: 100%;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .login-card h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 44px; line-height: 1.0;
    margin: 0 0 4px;
    color: var(--jin-navy);
  }
  .login-card h1 .rest { color: var(--title-blue); font-weight: 700; }
  .login-card h1 .dot  { color: var(--title-gold); }
  .login-card .sub {
    color: var(--ink-soft); margin: 0 0 28px;
    font-size: 14px;
    font-family: 'Nanum Pen Script', cursive;
    font-size: 22px;
  }
  .login-card label {
    display: block; text-align: left; font-size: 13px;
    color: var(--ink-soft); margin-bottom: 6px;
  }
  .login-card input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    font-family: inherit; font-size: 15px;
    margin-bottom: 12px;
    transition: border-color .15s ease;
  }
  .login-card input:focus {
    outline: none; border-color: var(--accent); background: var(--surface);
  }
  .login-card button.primary {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    justify-content: center;
  }
  .login-card .msg {
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-soft);
    min-height: 20px;
    white-space: pre-wrap;
  }
  .login-card .msg.success { color: var(--ok); }
  .login-card .msg.error   { color: var(--danger); }

  .login-card .google-btn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    justify-content: center;
    background: #fff;
    color: #3c4043;
    border: 1px solid #dadce0;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .login-card .google-btn:hover {
    background: #f8f9fa;
    border-color: #dadce0;
    color: #3c4043;
    transform: translateY(-1px);
  }
  .login-card .google-btn .gico {
    display: inline-block;
    width: 18px; height: 18px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="%23EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="%234285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="%23FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="%2334A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>');
    background-size: contain;
    background-repeat: no-repeat;
    margin-right: 4px;
  }
  .login-card .divider {
    display: flex; align-items: center;
    margin: 18px 0 14px;
    color: var(--ink-mute); font-size: 12px;
    gap: 10px;
  }
  .login-card .divider::before,
  .login-card .divider::after {
    content: ""; flex: 1; border-top: 1px solid var(--line);
  }

  /* ---------- Print ---------- */
  #print-view { display: none; }
  @media print {
    @page { margin: 18mm 16mm; }
    body { background: #fff; }
    .wrap, .modal-backdrop, .toast, .lightbox, .login-screen, .splash { display: none !important; }
    #print-view { display: block !important; padding: 0; }
    #print-view h1 {
      font-family: 'Jua', 'Gaegu', sans-serif;
      font-size: 28px; margin: 0 0 4px;
    }
    #print-view .print-meta {
      font-size: 12px; color: #666; margin-bottom: 18px;
      border-bottom: 1px solid #ccc; padding-bottom: 10px;
    }
    .print-item {
      page-break-inside: avoid;
      border-bottom: 1px dotted #aaa;
      padding: 12px 0;
      display: grid; grid-template-columns: 120px 1fr; gap: 14px; align-items: start;
    }
    .print-item img {
      width: 120px; height: 120px; object-fit: cover; border-radius: 6px;
    }
    .print-item .ph { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
    .print-item .p-ko { font-size: 16px; font-weight: 700; }
    .print-item .p-en { font-size: 13px; color: #555; font-family: 'Nanum Gothic Coding', monospace; }
    .print-item .p-cat { font-size: 11px; background: #eee; padding: 1px 8px; border-radius: 999px; color: #555; }
    .print-item .p-meaning { margin-top: 6px; font-size: 13px; color: #222; white-space: pre-wrap; }
  }

  .row { display: flex; gap: 8px; align-items: center; }
  .hidden { display: none !important; }

  @media (max-width: 640px) {
    .wrap { padding: 20px 16px 80px; }
    .brand h1 { font-size: 46px; }
    .term-card { grid-template-columns: auto auto 1fr; }
    .term-actions { grid-column: 1 / -1; justify-content: flex-end; }
    .toolbar { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ============ Splash (initial) ============ -->
<div class="splash" id="splash">Jin's Archive<span class="dot">.</span></div>

<!-- ============ Login ============ -->
<div class="login-screen" id="login-view">
  <div class="login-card">
    <h1><span>Jin</span><span class="rest">'s Archive</span><span class="dot">.</span></h1>
    <p class="sub">로그인하면 어떤 기기·브라우저에서든 같은 데이터를 볼 수 있어요</p>
    <button id="btn-google" class="google-btn"><span class="gico"></span>Google로 계속하기</button>
    <div class="divider">또는 이메일로</div>
    <label for="login-email">이메일</label>
    <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" />
    <button id="btn-magiclink" class="primary">로그인 링크 받기</button>
    <p class="msg" id="login-msg"></p>
  </div>
</div>

<!-- ============ App ============ -->
<div class="wrap hidden" id="app-view">
  <header class="app-header">
    <div class="brand">
      <h1 aria-label="Jin's Archive"><span class="jin">Jin</span><span class="rest">'s Archive</span><span class="dot">.</span></h1>
      <p>IT 용어를 차곡차곡 정리하는 진의 작은 서재</p>
    </div>
    <div class="header-actions">
      <span class="account-widget">
        <span class="email" id="account-email"></span>
        <button id="btn-signout" class="ghost" title="로그아웃">로그아웃</button>
      </span>
      <button id="btn-add" class="primary">＋ 새 용어</button>
      <button id="btn-excel" class="ghost" title="엑셀(.xlsx)로 내보내기">📊 엑셀</button>
      <button id="btn-export" class="ghost" title="JSON 전체 백업 (사진 포함)">⬇ 백업</button>
      <button id="btn-import" class="ghost" title="JSON 복원">⬆ 가져오기</button>
      <input type="file" id="file-import" accept="application/json" hidden />
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <button id="btn-search" class="icon-btn" title="검색">🔎</button>
      <input id="search-input" type="text" placeholder="한글명, 영문명, 뜻 어디든 검색…" />
    </div>
    <div class="row">
      <button id="btn-add-cat" class="ghost">＋ 카테고리</button>
    </div>
  </div>

  <div class="chip-row" id="chip-row"></div>

  <div class="selection-bar hidden" id="selection-bar">
    <div><strong id="selection-count">0</strong>개 선택됨</div>
    <div class="row">
      <button id="btn-clear-sel" class="ghost">선택 해제</button>
      <button id="btn-print" class="primary">🖨 선택한 용어 인쇄</button>
    </div>
  </div>

  <div class="terms" id="terms"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="modal-term">
  <div class="modal">
    <h2 id="modal-title">새 용어 추가</h2>
    <div class="field">
      <label for="f-ko">한글명</label>
      <input id="f-ko" type="text" placeholder="예: 객체 지향 프로그래밍" />
    </div>
    <div class="field">
      <label for="f-en">영문명</label>
      <input id="f-en" type="text" placeholder="예: Object-Oriented Programming" />
    </div>
    <div class="field">
      <label for="f-cat">카테고리</label>
      <select id="f-cat"></select>
    </div>
    <div class="field">
      <label for="f-meaning">의미</label>
      <textarea id="f-meaning" placeholder="개념, 핵심 포인트, 짧은 예시 등을 적어두면 좋아요."></textarea>
    </div>
    <div class="field">
      <label>사진 <span class="req">*</span></label>
      <div class="photo-upload">
        <div id="photo-preview" class="photo-preview"><span>미선택</span></div>
        <div class="photo-actions">

<script>
/* ============================================================
   Jin's Archive — Supabase-backed
   ============================================================ */

const SUPABASE_URL = 'https://wvkjfcocetzavjwolykf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oUGFVnMXlirEZkBvod7cCQ_7ICDikje';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const FALLBACK_CATEGORY = '일반 용어';
const CAT_PALETTE = [
  { bg: '#FFE3E3', fg: '#D14B5A' },
  { bg: '#E1F3E4', fg: '#3A9D5D' },
  { bg: '#DBEAFD', fg: '#2E72D2' },
  { bg: '#FFE7CC', fg: '#E47B27' },
  { bg: '#ECDFF4', fg: '#8B4FB8' },
  { bg: '#D6F1F4', fg: '#1F8B95' },
  { bg: '#FBDDEB', fg: '#D04D88' },
  { bg: '#E9F4D2', fg: '#7AAD3C' },
  { bg: '#E4DBF0', fg: '#6B4FAE' },

];
const LAST_EMAIL_KEY = 'jarch-last-email';

let state = { categories: [], terms: [] };

/* ---------------- Toast ---------------- */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function catColor(name) {
  const idx = state.categories.indexOf(name);
  if (idx < 0) return { bg: '#EEE', fg: '#555' };
  return CAT_PALETTE[idx % CAT_PALETTE.length];
}

/* ---------------- Auth ---------------- */
async function initAuth() {
  const { data: { session: s } } = await sb.auth.getSession();
  await applySession(s);
  sb.auth.onAuthStateChange(async (_event, s2) => { await applySession(s2); });
}

async function applySession(s) {
  const splash = document.getElementById('splash');
  const loginView = document.getElementById('login-view');
  const appView = document.getElementById('app-view');

  session = s;
  if (s) {
    // logged in
    loginView.classList.remove('open');
    appView.classList.remove('hidden');
    splash.classList.add('hidden');
    document.getElementById('account-email').textContent = s.user.email || '';
    // Strip auth tokens from URL hash if present
    if (window.location.hash.includes('access_token') || window.location.search.includes('code=')) {
      window.history.replaceState({}, '', window.location.pathname);
    }
    await hydrate();
    subscribeRealtime();
  } else {
    // logged out
    appView.classList.add('hidden');
    splash.classList.add('hidden');
    loginView.classList.add('open');
    unsubscribeRealtime();
    // Prefill last used email
    const last = localStorage.getItem(LAST_EMAIL_KEY);
    if (last) document.getElementById('login-email').value = last;
  }
}

async function sendMagicLink() {
  const emailEl = document.getElementById('login-email');
  const msgEl = document.getElementById('login-msg');
  const btn = document.getElementById('btn-magiclink');
  const email = emailEl.value.trim();
  msgEl.className = 'msg';
  msgEl.textContent = '';

  if (!email || !email.includes('@')) {
    msgEl.classList.add('error');
    msgEl.textContent = '올바른 이메일을 입력해주세요';
    return;
  }
  btn.disabled = true;
  btn.textContent = '전송 중…';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  btn.disabled = false;
  btn.textContent = '로그인 링크 받기';

  if (error) {
    msgEl.classList.add('error');
    msgEl.textContent = '전송 실패: ' + error.message;
    return;
  }
  localStorage.setItem(LAST_EMAIL_KEY, email);
  msgEl.classList.add('success');
  msgEl.textContent = `${email} 로 로그인 링크를 보냈어요.\n메일함을 확인하고 링크를 클릭하면 자동 로그인됩니다.`;
}

async function signInGoogle() {
  const msgEl = document.getElementById('login-msg');
  msgEl.className = 'msg';
  msgEl.textContent = '';
  const { error } = await sb.auth.signInWithOAuth({

    } else {
      msgEl.textContent = '로그인 실패: ' + error.message;
    }
  }
}

async function signOut() {
  await sb.auth.signOut();
}

/* ---------------- Data: hydrate + realtime ---------------- */
async function hydrate() {
  const [catsRes, termsRes] = await Promise.all([
    sb.from('categories').select('id, name, created_at').order('created_at'),
    sb.from('terms').select('id, ko, en, category, meaning, photo, created_at, updated_at'),
  ]);
  if (catsRes.error)  { toast('카테고리 로드 실패: ' + catsRes.error.message);  return; }
  if (termsRes.error) { toast('용어 로드 실패: ' + termsRes.error.message);     return; }

  state.categories = (catsRes.data || []).map(c => c.name);
  state.terms = (termsRes.data || []).map(t => ({
    id: t.id,
    ko: t.ko || '',
    en: t.en || '',
    category: t.category || FALLBACK_CATEGORY,
    meaning: t.meaning || '',
    photo: t.photo || '',
    createdAt: t.created_at,
    updatedAt: t.updated_at,
  }));
  renderAll();
}

function subscribeRealtime() {
  if (rtChannel) return;
  rtChannel = sb.channel('jarch-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'terms' },      () => hydrate())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'categories' }, () => hydrate())
    .subscribe();
}
function unsubscribeRealtime() {
  if (rtChannel) { sb.removeChannel(rtChannel); rtChannel = null; }
}

/* ---------------- Chips ---------------- */
function renderChips() {
  const row = document.getElementById('chip-row');
  row.innerHTML = '';

  const all = document.createElement('span');
  all.className = 'chip chip-all' + (filter.category === 'ALL' ? ' active' : '');
  all.textContent = `전체 (${state.terms.length})`;
  all.onclick = () => {
    filter.category = 'ALL';
    filter.query = '';
    document.getElementById('search-input').value = '';
    renderAll();
  };
  row.appendChild(all);

  state.categories.forEach(cat => {
    const count = state.terms.filter(t => t.category === cat).length;
    const color = catColor(cat);

    const c = document.createElement('span');
    c.className = 'chip' + (filter.category === cat ? ' active' : '');
    c.style.background = color.bg;
    c.style.color = color.fg;
    c.style.borderColor = filter.category === cat ? color.fg : 'transparent';

    const text = document.createElement('span');
    text.textContent = `${cat} (${count})`;
    c.appendChild(text);
    c.onclick = () => { filter.category = cat; renderAll(); };

    // 모든 카테고리에 삭제 X를 노출 (Supabase 환경에선 기본 4개도 사용자 데이터)
    const x = document.createElement('span');
    x.className = 'x';
    x.textContent = '✕';
    x.title = '카테고리 삭제';
    x.onclick = (e) => { e.stopPropagation(); deleteCategory(cat); };
    c.appendChild(x);
    row.appendChild(c);
  });
}

/* ---------------- Terms ---------------- */
function renderTerms() {
  const container = document.getElementById('terms');
  container.innerHTML = '';

  const q = filter.query.trim().toLowerCase();
  let list = state.terms.slice();

  if (filter.category !== 'ALL') {
    list = list.filter(t => t.category === filter.category);
  }
  if (q) {
    list = list.filter(t =>
      (t.ko || '').toLowerCase().includes(q) ||
      (t.en || '').toLowerCase().includes(q) ||
      (t.meaning || '').toLowerCase().includes(q)
    );
  }

  list.sort((a, b) => (a.ko || '').localeCompare(b.ko || '', 'ko'));

  if (list.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = state.terms.length === 0
      ? `<h3>아직 정리한 용어가 없어요</h3><p>오른쪽 위 <strong>＋ 새 용어</strong>로 첫 용어를 담아보세요.<br>이전에 백업해둔 JSON이 있다면 <strong>⬆ 가져오기</strong>로 복원할 수도 있어요.</p>`
      : `<h3>조건에 맞는 용어가 없어요</h3><p>다른 검색어나 카테고리를 시도해 보세요.</p>`;
    container.appendChild(empty);
    return;
  }

  list.forEach(t => container.appendChild(renderTermCard(t)));
}

function renderTermCard(t) {
  const card = document.createElement('div');
  card.className = 'term-card' + (selection.has(t.id) ? ' selected' : '');

  const check = document.createElement('input');
  check.type = 'checkbox';
  check.className = 'term-check';
  check.checked = selection.has(t.id);
  check.title = '인쇄 선택';
  check.onchange = () => {
    if (check.checked) selection.add(t.id);
    else selection.delete(t.id);
    renderSelectionBar();
    card.classList.toggle('selected', check.checked);
  };

  const thumb = document.createElement('img');
  thumb.className = 'term-thumb';
  thumb.alt = '';
  thumb.src = t.photo || '';
  thumb.onclick = () => { if (t.photo) openLightbox(t.photo); };

  const body = document.createElement('div');
  const color = catColor(t.category);
  body.innerHTML = `
    <div class="term-head">
      <span class="term-ko">${escapeHtml(t.ko || '(이름 없음)')}</span>
      ${t.en ? `<span class="term-en">${escapeHtml(t.en)}</span>` : ''}
      <span class="term-cat" style="background:${color.bg};color:${color.fg};">${escapeHtml(t.category)}</span>
    </div>
    ${t.meaning ? `<div class="term-meaning">${escapeHtml(t.meaning)}</div>` : ''}
  `;

  const actions = document.createElement('div');
  actions.className = 'term-actions';
  const edit = document.createElement('button');
  edit.textContent = '수정';
  edit.onclick = () => openTermModal(t.id);
  const del = document.createElement('button');
  del.className = 'danger';
  del.textContent = '삭제';
  del.onclick = () => deleteTerm(t.id);
  actions.appendChild(edit);
  actions.appendChild(del);

  card.appendChild(check);
  card.appendChild(thumb);
  card.appendChild(body);
  card.appendChild(actions);
  return card;
}

function renderSelectionBar() {

  document.getElementById('selection-count').textContent = selection.size;
  bar.classList.toggle('hidden', selection.size === 0);
}

function renderAll() {

  pendingPhoto = null;
  document.getElementById('modal-title').textContent = id ? '용어 수정' : '새 용어 추가';

  const sel = document.getElementById('f-cat');
  sel.innerHTML = '';
  state.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });

    document.getElementById('f-en').value = t.en || '';

    if (t.photo) {

      preview.innerHTML = `<img src="${t.photo}" alt="" />`;

    document.getElementById('f-ko').value = '';

function closeTermModal() {
  document.getElementById('modal-term').classList.remove('open');
  editingId = null;
  pendingPhoto = null;
}

async function saveTerm() {
  const ko = document.getElementById('f-ko').value.trim();
  const en = document.getElementById('f-en').value.trim();
  const meaning = document.getElementById('f-meaning').value.trim();
  const category = document.getElementById('f-cat').value;

  if (!ko && !en)    return toast('한글명 또는 영문명 중 하나는 입력해주세요');
  if (!category)     return toast('카테고리를 선택해주세요');
  if (!pendingPhoto) return toast('사진을 첨부해야 저장할 수 있어요');

  const btn = document.getElementById('m-save');
  btn.disabled = true;
  try {
    let res;
    if (editingId) {
      res = await sb.from('terms')
        .update({ ko, en, meaning, category, photo: pendingPhoto })
        .eq('id', editingId);
    } else {
      res = await sb.from('terms')
        .insert({ ko, en, meaning, category, photo: pendingPhoto });
    }
    if (res.error) throw res.error;
    toast(editingId ? '수정되었습니다' : '새 용어가 추가되었습니다');
    closeTermModal();
    await hydrate();
  } catch (e) {
    toast('저장 실패: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function deleteTerm(id) {
  const t = state.terms.find(x => x.id === id);
  if (!t) return;
  if (!confirm(`"${t.ko || t.en}" 용어를 삭제할까요?`)) return;
  const { error } = await sb.from('terms').delete().eq('id', id);
  if (error) return toast('삭제 실패: ' + error.message);
  selection.delete(id);
  toast('삭제되었습니다');
  await hydrate();
}

/* ---------------- Photo handling ---------------- */
function resizeImage(file, maxWidth = 600, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(1, maxWidth / img.width);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handlePhotoPick(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) return toast('이미지 파일만 가능합니다');
  try {
    const dataUrl = await resizeImage(file);
    pendingPhoto = dataUrl;
    document.getElementById('photo-preview').innerHTML = `<img src="${dataUrl}" alt="" />`;
  } catch (e) {
    toast('사진을 처리할 수 없어요');
  }
}

/* ---------------- Category modal ---------------- */
function openCatModal() {

}

async function saveCategory() {
  const name = document.getElementById('f-cat-name').value.trim();
  if (!name) return toast('카테고리 이름을 입력해주세요');
  if (state.categories.includes(name)) return toast('이미 있는 카테고리예요');
  const { error } = await sb.from('categories').insert({ name });
  if (error) return toast('카테고리 추가 실패: ' + error.message);
  closeCatModal();
  toast(`'${name}' 카테고리가 추가되었습니다`);
  await hydrate();
}

async function deleteCategory(name) {
  const used = state.terms.filter(t => t.category === name).length;
  let msg = `'${name}' 카테고리를 삭제할까요?`;
  if (used > 0) msg += `\n이 카테고리에 속한 ${used}개 용어는 '${FALLBACK_CATEGORY}'로 이동됩니다.`;
  if (!confirm(msg)) return;

  if (used > 0) {
    // Ensure fallback category exists for this user
    if (!state.categories.includes(FALLBACK_CATEGORY)) {
      const insRes = await sb.from('categories').insert({ name: FALLBACK_CATEGORY });
      if (insRes.error && !/duplicate|unique/i.test(insRes.error.message)) {
        return toast('이동 실패: ' + insRes.error.message);
      }
    }
    const updRes = await sb.from('terms').update({ category: FALLBACK_CATEGORY }).eq('category', name);
    if (updRes.error) return toast('이동 실패: ' + updRes.error.message);
  }
  const delRes = await sb.from('categories').delete().eq('name', name);
  if (delRes.error) return toast('삭제 실패: ' + delRes.error.message);
  if (filter.category === name) filter.category = 'ALL';
  toast('카테고리가 삭제되었습니다');
  await hydrate();
}

/* ---------------- Print ---------------- */
function printSelected() {
  if (selection.size === 0) return toast('인쇄할 용어를 먼저 선택해주세요');
  const items = state.terms
    .filter(t => selection.has(t.id))
    .sort((a, b) => (a.ko || '').localeCompare(b.ko || '', 'ko'));

  const view = document.getElementById('print-view');
  const today = new Date().toLocaleDateString('ko-KR');
  view.innerHTML = `
    <h1>Jin's Archive</h1>
    <div class="print-meta">선택한 용어 ${items.length}개 · 인쇄일 ${today}</div>
    ${items.map(t => `
      <div class="print-item">
        ${t.photo ? `<img src="${t.photo}" alt="" />` : '<div></div>'}
        <div>
          <div class="ph">
            <span class="p-ko">${escapeHtml(t.ko || '')}</span>
            ${t.en ? `<span class="p-en">${escapeHtml(t.en)}</span>` : ''}
            <span class="p-cat">${escapeHtml(t.category)}</span>
          </div>
          ${t.meaning ? `<div class="p-meaning">${escapeHtml(t.meaning)}</div>` : ''}
        </div>
      </div>
    `).join('')}
  `;
  window.print();
}

/* ---------------- Excel export ---------------- */
function exportExcel() {
  if (typeof XLSX === 'undefined') {
    return alert('엑셀 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
  }
  if (state.terms.length === 0) {
    return toast('내보낼 용어가 없어요');
  }

  const COL_WIDTHS = [
    { wch: 5 }, { wch: 24 }, { wch: 32 }, { wch: 14 }, { wch: 60 }, { wch: 12 },
  ];

  const makeRow = (t, i) => ({
    '번호': i + 1,
    '한글명': t.ko || '',
    '영문명': t.en || '',
    '카테고리': t.category || '',
    '의미': t.meaning || '',
    '등록일': (t.createdAt || '').slice(0, 10),
  });

  const wb = XLSX.utils.book_new();
  const allRows = state.terms.slice()
    .sort((a, b) => (a.ko || '').localeCompare(b.ko || '', 'ko'))
    .map(makeRow);
  const wsAll = XLSX.utils.json_to_sheet(allRows);
  wsAll['!cols'] = COL_WIDTHS;
  XLSX.utils.book_append_sheet(wb, wsAll, '전체');

  state.categories.forEach(cat => {
    const rows = state.terms
      .filter(t => t.category === cat)
      .sort((a, b) => (a.ko || '').localeCompare(b.ko || '', 'ko'))
      .map(makeRow);
    if (rows.length === 0) return;
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = COL_WIDTHS;
    const safeName = cat.replace(/[\\\/\*\?\[\]:]/g, '_').slice(0, 31);
    XLSX.utils.book_append_sheet(wb, ws, safeName);
  });

  const stamp = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `jins-archive_${stamp}.xlsx`);
  toast('엑셀 파일이 저장되었습니다');
}

/* ---------------- Import / Export ---------------- */
function exportJSON() {
  const payload = {
    categories: state.categories.slice(),
    terms: state.terms.map(t => ({
      id: t.id, ko: t.ko, en: t.en, category: t.category, meaning: t.meaning,
      photo: t.photo, createdAt: t.createdAt, updatedAt: t.updatedAt,
    })),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url; a.download = `jins-archive_${stamp}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('백업 파일이 저장되었습니다');
}

async function importJSON(file) {
  let data;
  try {
    const text = await file.text();
    data = JSON.parse(text);
    if (!Array.isArray(data.terms) || !Array.isArray(data.categories)) {
      throw new Error('형식이 올바르지 않습니다 (terms, categories 배열이 필요)');
    }
  } catch (err) {
    return alert('파일을 읽을 수 없습니다: ' + err.message);
  }

  const replace = confirm(
    '가져온 데이터로 현재 데이터를 \'대체\'할까요?\n\n' +
    '[확인] = 전체 대체 (현재 클라우드 데이터를 모두 삭제하고 가져온 것으로 교체)\n' +
    '[취소] = 병합 (기존 유지, 가져온 항목 중 새로운 것만 추가)'
  );

  toast('가져오는 중…');

  try {
    if (replace) {
      // Delete all existing rows for this user (RLS limits to own rows)
      const delTerms = await sb.from('terms').delete().not('id', 'is', null);
      if (delTerms.error) throw delTerms.error;
      const delCats = await sb.from('categories').delete().not('id', 'is', null);
      if (delCats.error) throw delCats.error;
    }

    // 1) Categories — insert all unique ones, ignore duplicates
    const existingCats = replace ? [] : state.categories.slice();
    const catsToAdd = data.categories.filter(c => c && !existingCats.includes(c));
    if (catsToAdd.length) {
      const { error } = await sb.from('categories').insert(catsToAdd.map(name => ({ name })));
      // ignore unique-violation errors
      if (error && !/duplicate|unique/i.test(error.message)) throw error;
    }

    // 2) Terms — drop old IDs, batch insert (10 at a time to keep payload small)
    const existingKeys = replace ? new Set() :
      new Set(state.terms.map(t => `${t.ko || ''}||${t.en || ''}`));
    const toInsert = data.terms
      .filter(t => {
        const key = `${t.ko || ''}||${t.en || ''}`;
        if (existingKeys.has(key)) return false;
        existingKeys.add(key);
        return true;
      })
      .map(t => ({
        ko: t.ko || '',
        en: t.en || '',
        category: t.category || FALLBACK_CATEGORY,
        meaning: t.meaning || '',
        photo: t.photo || null,
      }));

    const BATCH = 10;
    let done = 0;
    for (let i = 0; i < toInsert.length; i += BATCH) {
      const slice = toInsert.slice(i, i + BATCH);
      const { error } = await sb.from('terms').insert(slice);
      if (error) throw error;
      done += slice.length;
      if (toInsert.length > BATCH) toast(`가져오는 중… ${done}/${toInsert.length}`);
    }

    toast(`${toInsert.length}개 용어를 가져왔습니다`);
    await hydrate();
  } catch (err) {
    alert('가져오기 실패: ' + (err.message || err));
  }
}

});

  document.getElementById('search-input').focus();
};

document.getElementById('btn-pick-photo').onclick = () => document.getElementById('f-photo').click();
document.getElementById('photo-preview').onclick = () => document.getElementById('f-photo').click();

};

// lightbox close
document.getElementById('lightbox').onclick = closeLightbox;

// close modals on backdrop click & Esc
document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.open').forEach(m => m.classList.remove('open'));
    closeLightbox();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    const si = document.getElementById('search-input');
    if (si && !document.getElementById('app-view').classList.contains('hidden')) si.focus();
  }
});

document.getElementById('f-cat-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveCategory();
});

initAuth();
</script>
